services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
    volumes:
      - app-data:/app/data
      - app-vectorstore:/app/vectorstore
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama

volumes:
  app-data:
  app-vectorstore:
  ollama:
