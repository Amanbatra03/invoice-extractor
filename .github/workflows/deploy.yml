name: Deploy to Render
# Manual trigger until PROD_DATABASE_URL and RENDER_DEPLOY_HOOK_* secrets are
# configured; then re-enable automatic deploys with:
#   push:
#     branches: [master]
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          pip install -e ".[prod]"
          alembic upgrade head

      - name: Deploy API to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"

      - name: Deploy Frontend to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

      - name: Deploy Worker to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WORKER }}"
