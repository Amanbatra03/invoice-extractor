name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: invoice_test
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Advisory for now: these have not been enforced historically; tightening is tracked separately
      - name: Lint (ruff)
        continue-on-error: true
        run: ruff check .

      - name: Type check (mypy)
        continue-on-error: true
        run: mypy api/ agents/ workers/ db/ --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/invoice_test
          REDIS_URL: redis://localhost:6379
          SUPABASE_URL: https://fake.supabase.co
          SUPABASE_ANON_KEY: fake_anon_key
          SUPABASE_SERVICE_KEY: fake_service_key
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY_TEST }}
          LLM_PROVIDER: gemini
          LANGCHAIN_TRACING_V2: "false"
          ENV: test
        # Enterprise suite only: the classic-app tests (tests/test_*.py) need the
        # requirements.txt stack (chromadb, sentence-transformers) not shipped in pyproject
        run: |
          DATABASE_URL=postgresql+asyncpg://postgres:test@localhost/invoice_test alembic upgrade head
          pytest tests/unit tests/integration -v --cov=api --cov=agents --cov=workers --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
